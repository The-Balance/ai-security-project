services:
  # ==================== REDIS - Data Store ====================
  redis:
    image: redis:7-alpine
    container_name: waf-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379" # Remove this in production!
    networks:
      waf-network:
        ipv4_address: 192.168.100.10
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ==================== PROXY - WAF Gateway ====================
  proxy-server:
    build:
      context: ./proxy-server
      dockerfile: Dockerfile
    container_name: waf-proxy
    ports:
      - "8080:8080" # WAF listens here
    environment:
      # Redis connection
      - REDIS_HOST=192.168.100.10
      - REDIS_PORT=6379

      # Target website to protect
      - TARGET_WEBSITE=${TARGET_WEBSITE}

      # AI server
      - AI_SERVER_URL=http://192.168.100.20:8000

      # Layer toggles
      - LAYER1_ENABLED=true
      - LAYER2_ENABLED=true
      - LAYER3_ENABLED=${LAYER3_ENABLED:-false} # AI disabled by default

      # Security settings
      - LOG_ALL_REQUESTS=true
      - INCLUDE_RULE_INFO=false
    networks:
      waf-network:
        ipv4_address: 192.168.100.30
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./proxy-server:/app
      - proxy-logs:/var/log/waf
    restart: unless-stopped

  # ==================== AI Server - Layer 3 ====================
  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: waf-ai
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - USE_OLLAMA=${USE_OLLAMA:-false}
      - REDIS_HOST=192.168.100.10
    networks:
      waf-network:
        ipv4_address: 192.168.100.20
    volumes:
      - ./ai-server:/app
      - ai-logs:/var/log/ai
    restart: unless-stopped
    # Uncomment if you have GPU and Ollama
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

    # ==================== Dashboard - Monitoring ====================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: waf-dashboard
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=192.168.100.10
      - REDIS_PORT=6379
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin123}
    networks:
      waf-network:
        ipv4_address: 192.168.100.40
    depends_on:
      - redis
    volumes:
      - ./dashboard:/app
    restart: unless-stopped

  # ==================== ATTACKER (Kali Linux) ====================
  attacker:
    image: kalilinux/kali-rolling
    container_name: waf-attacker
    # Install common attack tools automatically, then stay awake
    command: sh -c "apt-get update && apt-get install -y curl nmap sqlmap wfuzz && tail -f /dev/null"
    networks:
      waf-network:
        ipv4_address: 192.168.100.52
    restart: unless-stopped

# ==================== NETWORKS ====================
networks:
  waf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24

# ==================== VOLUMES ====================
volumes:
  redis-data:
    driver: local
  proxy-logs:
    driver: local
  ai-logs:
    driver: local
